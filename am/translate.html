<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>AI Translation - AccessMind</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Font -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

  <!-- Animations -->
  <style>
    .fade-in {
      animation: fadeIn 1s ease-in;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .glow:hover {
      box-shadow: 0 0 20px rgba(99,102,241,0.7);
    }

    .float {
      animation: float 3s ease-in-out infinite;
    }
    @keyframes float {
      0%,100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }

    .hover-lift:hover {
      transform: translateY(-5px);
    }
  </style>
</head>

<body class="bg-black text-white font-[Inter] relative overflow-x-hidden">

<!-- 🌌 Background Glow -->
<div class="absolute top-[-100px] left-[-100px] w-[400px] h-[400px] bg-blue-600 opacity-20 blur-3xl rounded-full"></div>
<div class="absolute bottom-[-100px] right-[-100px] w-[400px] h-[400px] bg-purple-600 opacity-20 blur-3xl rounded-full"></div>

<div class="flex">

  <!-- Sidebar -->
  <div class="w-64 h-screen backdrop-blur-lg bg-white/10 border-r border-white/10 p-5 fixed">

    <h1 class="text-xl font-bold mb-8">AccessMind</h1>

    <ul class="space-y-4">
      <li><a href="dashboard.html" class="block p-2 hover:bg-white/10 rounded">Dashboard</a></li>
      <li><a href="scanner.html" class="block p-2 hover:bg-white/10 rounded">Scanner</a></li>
      <li><a href="adaptive.html" class="block p-2 hover:bg-white/10 rounded">Adaptive</a></li>
      <li><a href="translate.html" class="block p-2 bg-white/10 rounded">Translate</a></li>
      <li><a href="reports.html" class="block p-2 hover:bg-white/10 rounded">Reports</a></li>
      <li><a href="settings.html" class="block p-2 hover:bg-white/10 rounded">Settings</a></li>
    </ul>

  </div>

  <!-- Main -->
  <div class="ml-64 flex-1 p-10 fade-in">

    <h1 class="text-3xl font-bold mb-6">AI Translation</h1>

    <!-- Input -->
    <textarea id="inputText" placeholder="Enter English text..." 
      class="w-full h-32 p-4 rounded-2xl bg-gradient-to-br from-zinc-800 to-zinc-900 mb-4 outline-none glow">
    </textarea>

    <!-- Controls -->
    <div class="flex gap-4 mb-4">

      <select id="lang" class="bg-zinc-800 p-3 rounded-xl outline-none focus:ring-2 focus:ring-purple-500">
        <option value="Tamil">Tamil</option>
        <option value="Telugu">Telugu</option>
        <option value="Hindi">Hindi</option>
      </select>

      <button onclick="translateText()" 
        class="bg-gradient-to-r from-blue-500 to-purple-600 px-6 py-3 rounded-xl font-semibold hover:scale-105 hover:shadow-lg transition duration-300">
        Translate with AI
      </button>

    </div>

    <!-- Toggles -->
    <div class="bg-gradient-to-br from-zinc-800 to-zinc-900 p-4 rounded-2xl mb-6 glow hover-lift">
      <label class="flex items-center gap-2 mb-2">
        <input type="checkbox" onclick="simplify()"> Simplify Translation
      </label>

      <label class="flex items-center gap-2">
        <input type="checkbox" onclick="speak()"> Speak Output
      </label>
    </div>

    <!-- Output -->
    <div class="grid grid-cols-2 gap-6">

      <div class="bg-gradient-to-br from-zinc-800 to-zinc-900 p-6 rounded-2xl glow hover-lift">
        <h2 class="mb-2 font-semibold">Original</h2>
        <p id="original" class="text-gray-300"></p>
      </div>

      <div class="bg-gradient-to-br from-zinc-800 to-zinc-900 p-6 rounded-2xl glow hover-lift">
        <h2 class="mb-2 font-semibold">Translated</h2>
        <p id="translated" class="text-gray-300">...</p>
      </div>

    </div>

  </div>

</div>

<!-- Floating Toolbar -->
<div class="fixed bottom-6 right-6 float">

  <div class="bg-white/10 backdrop-blur-lg p-4 rounded-2xl shadow-lg flex gap-3">

    <button onclick="speak()" class="hover:scale-110 transition">🔊</button>
    <button class="hover:scale-110 transition">⏸️</button>

    <select class="bg-black text-white rounded px-2">
      <option>EN</option>
      <option>Tamil</option>
      <option>Hindi</option>
    </select>

  </div>

</div>

<!-- Script -->
<script>
function translateText() {
  const text = document.getElementById("inputText").value;
  const lang = document.getElementById("lang").value;

  document.getElementById("original").innerText = text;
  document.getElementById("translated").innerText = 
    "Translated (" + lang + "): " + text;
}

function simplify() {
  document.getElementById("translated").innerText = "Simplified translation output.";
}

function speak() {
  const text = document.getElementById("translated").innerText;
  const speech = new SpeechSynthesisUtterance(text);
  speechSynthesis.speak(speech);
}
</script>

</body>
</html>
