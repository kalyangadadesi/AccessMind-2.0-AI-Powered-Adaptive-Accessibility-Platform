<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>AccessMind 2.0</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Font (FIXED POSITION) -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

  <!-- Animations -->
  <style>
    .fade-in {
      animation: fadeIn 1s ease-in;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .hover-lift:hover {
      transform: translateY(-5px);
    }
  </style>
</head>

<body class="bg-black text-white font-[Inter] relative overflow-x-hidden">

<!-- 🌌 Background Glow -->
<div class="absolute top-[-100px] left-[-100px] w-[400px] h-[400px] bg-blue-600 opacity-20 blur-3xl rounded-full"></div>
<div class="absolute bottom-[-100px] right-[-100px] w-[400px] h-[400px] bg-purple-600 opacity-20 blur-3xl rounded-full"></div>

<!-- 🚀 HERO -->
<section class="h-screen flex flex-col justify-center items-center text-center px-6 fade-in">

  <h1 class="text-6xl font-extrabold mb-6 drop-shadow-lg animate-pulse">
    AccessMind 2.0
  </h1>

  <p class="text-lg mb-8 max-w-xl text-gray-300">
    AI-Driven Universal Accessibility Engine for Digital Content
  </p>

  <div class="flex gap-4">

    <a href="dashboard.html" 
      class="bg-gradient-to-r from-blue-500 to-purple-600 px-6 py-3 rounded-xl font-semibold hover:scale-105 hover:shadow-lg transition duration-300 hover-lift">
      View Dashboard
    </a>

    <a href="scanner.html" 
      class="border border-white px-6 py-3 rounded-xl hover:bg-white hover:text-black transition hover-lift">
      Try Demo
    </a>

  </div>

</section>

</body>
</html>
