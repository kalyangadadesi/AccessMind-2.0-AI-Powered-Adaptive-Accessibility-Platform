<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>AI Scanner - AccessMind</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Tailwind CDN -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Animations -->
  <style>
    .fade-in {
      animation: fadeIn 1s ease-in;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .glow:hover {
      box-shadow: 0 0 20px rgba(99,102,241,0.7);
    }

    .float {
      animation: float 3s ease-in-out infinite;
    }
    @keyframes float {
      0%,100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }
  </style>
</head>

<body class="bg-black text-white font-[Inter] relative overflow-x-hidden">

<!-- Background Glow -->
<div class="absolute top-[-100px] left-[-100px] w-[400px] h-[400px] bg-blue-600 opacity-20 blur-3xl rounded-full"></div>
<div class="absolute bottom-[-100px] right-[-100px] w-[400px] h-[400px] bg-purple-600 opacity-20 blur-3xl rounded-full"></div>

<div class="flex">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

  <!-- Sidebar -->
  <div class="w-64 h-screen backdrop-blur-lg bg-white/10 border-r border-white/10 p-5 fixed">

    <h1 class="text-xl font-bold mb-8">AccessMind</h1>

    <ul class="space-y-4">
      <li><a href="dashboard.html" class="block p-2 hover:bg-white/10 rounded">Dashboard</a></li>
      <li><a href="scanner.html" class="block p-2 bg-white/10 rounded">Scanner</a></li>
      <li><a href="adaptive.html" class="block p-2 hover:bg-white/10 rounded">Adaptive</a></li>
      <li><a href="translate.html" class="block p-2 hover:bg-white/10 rounded">Translate</a></li>
      <li><a href="reports.html" class="block p-2 hover:bg-white/10 rounded">Reports</a></li>
      <li><a href="settings.html" class="block p-2 hover:bg-white/10 rounded">Settings</a></li>
    </ul>

  </div>

  <!-- Main -->
  <div class="ml-64 flex-1 p-10 fade-in">

    <h1 class="text-3xl font-bold mb-6">AI Accessibility Scanner</h1>

    <!-- Input -->
    <textarea 
      placeholder="Paste your content here..."
      class="w-full h-32 p-4 rounded-xl bg-zinc-800 mb-4 outline-none">
    </textarea>

    <!-- Button -->
    <button onclick="runScan()" 
      class="bg-gradient-to-r from-blue-500 to-purple-600 px-6 py-3 rounded-xl font-semibold hover:scale-105 transition">
      Scan with AI
    </button>

    <!-- Loader -->
    <div id="loader" class="hidden flex gap-2 mt-6">
      <div class="w-3 h-3 bg-blue-500 rounded-full animate-bounce"></div>
      <div class="w-3 h-3 bg-purple-500 rounded-full animate-bounce"></div>
      <div class="w-3 h-3 bg-pink-500 rounded-full animate-bounce"></div>
    </div>

    <!-- Output -->
    <div id="output" class="hidden mt-6 space-y-4">

      <!-- Score -->
      <div class="bg-gradient-to-br from-zinc-800 to-zinc-900 p-6 rounded-2xl glow">
        <h2 class="text-xl font-bold">Accessibility Score: 85%</h2>
      </div>

      <!-- Issues -->
      <div class="bg-red-500 p-4 rounded-xl glow">
        Missing alt text for images
      </div>

      <div class="bg-yellow-400 text-black p-4 rounded-xl glow">
        Complex sentence detected
      </div>

      <div class="bg-green-500 p-4 rounded-xl glow">
        Good contrast detected
      </div>

      <!-- AI Typing -->
      <p id="aiText" class="text-lg mt-4"></p>

    </div>

  </div>

</div>

<!-- Floating Toolbar -->
<div class="fixed bottom-6 right-6 float">

  <div class="bg-white/10 backdrop-blur-lg p-4 rounded-2xl shadow-lg flex gap-3">

    <button class="hover:scale-110 transition">▶️</button>
    <button class="hover:scale-110 transition">⏸️</button>

    <select class="bg-black text-white rounded px-2">
      <option>EN</option>
      <option>Tamil</option>
      <option>Hindi</option>
    </select>

  </div>

</div>

<!-- Script -->
<script>
function typeEffect(text, elementId) {
  let i = 0;
  function typing() {
    if (i < text.length) {
      document.getElementById(elementId).innerHTML += text.charAt(i);
      i++;
      setTimeout(typing, 30);
    }
  }
  typing();
}

function runScan() {
  document.getElementById("loader").classList.remove("hidden");

  setTimeout(() => {
    document.getElementById("loader").classList.add("hidden");
    document.getElementById("output").classList.remove("hidden");

    typeEffect("AI Suggestion: Simplify sentence for better readability.", "aiText");

  }, 2000);
}
</script>

</body>
</html>
